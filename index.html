<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Static fallback title — overridden by the browserTitle animation in
       script.js (see config.js -> browserTitle) once the page loads. -->
  <title>1gui</title>
  <meta name="description" content="building things.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="assets/favicon.png">

  <!-- Open Graph / social link previews (see config.js -> siteMeta) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="1gui">
  <meta property="og:description" content="building things.">
  <meta property="og:image" content="assets/avatar.jpg">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="1gui">
  <meta name="twitter:description" content="building things.">
  <meta name="twitter:image" content="assets/avatar.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== Background: video -> image -> CSS gradient ===== -->
  <video class="bg-media bg-video" id="bg-video" autoplay loop muted playsinline preload="auto">
    <source id="bg-video-source" src="assets/background.mp4" type="video/mp4">
  </video>
  <img class="bg-media bg-image" id="bg-image" src="assets/background.jpg" alt="">
  <div class="overlay"></div>

  <!-- ===== Click-to-enter gate (unlocks audio) ===== -->
  <div id="enter-screen" class="enter-screen">
    <div class="enter-content">
      <p class="enter-hint">click anywhere to enter</p>
    </div>
  </div>

  <!-- ===== Local-only view counter ===== -->
  <div id="view-counter" class="view-counter"></div>

  <!-- ===== Background music volume control (top-left, see config.js -> music) ===== -->
  <div class="volume-control" id="volume-control">
    <button id="mute-btn" class="mute-btn" type="button" aria-label="Mute" aria-pressed="false">
      <span id="volume-icon">🔊</span>
    </button>
    <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="30" aria-label="Volume">
  </div>

  <!-- ===== Central card ===== -->
  <main class="card" id="card">
    <div class="avatar-wrap">
      <img class="avatar" id="avatar" src="assets/avatar.jpg" alt="Avatar">
    </div>

    <h1 class="name" id="profile-name" data-text="1gui">
      <span class="name-text" id="profile-name-text">1gui</span>
      <span class="name-slice" id="profile-name-slice" aria-hidden="true">1gui</span>
    </h1>

    <p class="phrase" id="phrase"><span class="phrase-text" id="phrase-text"></span><span class="phrase-cursor" id="phrase-cursor" aria-hidden="true"></span></p>

    <!-- Each icon is hidden automatically if its config.js id/username is
         empty (see setupConnectLinks() in script.js). Purely link-outs —
         no live data, no API calls. Each icon has a duplicate "-slice" SVG
         layered on top for the same frequency-sweep effect used on the
         name (see .connect-icon-slice / iconFreqSlice in style.css). -->
    <div class="connect-links" id="connect-links">
      <a class="connect-link" id="discord-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="Discord profile">

        </span>
      </a>
      <a class="connect-link" id="github-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
        <span class="connect-icon-wrap">

        </span>
      </a>
    </div>

  </main>

  <!-- ===== Sound wave visualizer (bottom of screen, see config.js -> music) =====
       Reacts to the real track via the Web Audio API (see
       setupAudioVisualizer() in script.js). Sits below the connect icons,
       not inside the volume control box. Hidden automatically if music is
       disabled or the browser lacks Web Audio API support. -->
  <div class="sound-wave" id="sound-wave" aria-hidden="true">
    <canvas id="sound-wave-canvas"></canvas>
  </div>

  <!-- src is set from config.js -> music.path by initMusicPlayer() in script.js -->
  <audio id="bg-music" preload="none"></audio>

  <!-- ===== Custom cursor (desktop only, see config.js -> customCursor) ===== -->
  <div id="cursor-trail-layer" class="cursor-trail-layer" aria-hidden="true"></div>
  <div id="cursor-root" class="cursor-root" aria-hidden="true">
    <div class="cursor-center">
      <div class="cursor-scale">
        <div class="cursor-glow"></div>
        <div class="cursor-ball"></div>
        <img id="cursor-image" class="cursor-image" alt="" draggable="false">
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
